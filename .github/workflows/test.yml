name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim: ['v0.10.0', 'stable']
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - name: Run unit tests
        run: |
          nvim --headless -u tests/minimal_init.lua -l tests/run_specs.lua
